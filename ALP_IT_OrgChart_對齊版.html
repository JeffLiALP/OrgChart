<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:#f5f4f0;overflow:hidden;height:100vh;display:flex;flex-direction:column}
.header{background:#fff;border-bottom:1px solid #e0ddd6;padding:10px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;z-index:50}
.header h1{font-size:15px;font-weight:700}
.header .sub{font-size:10px;color:#999;margin-top:2px}
.toolbar{display:flex;gap:5px;align-items:center}
.toolbar button{padding:4px 10px;border:1px solid #ddd;background:#fff;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit;transition:background .15s}
.toolbar button:hover{background:#f0f0f0}
.toolbar .zoom-label{font-size:10px;color:#999;margin-left:4px;min-width:32px;text-align:right}
.legend{display:flex;gap:12px;padding:8px 20px;font-size:10px;color:#666;flex-wrap:wrap;background:#fff;border-bottom:1px solid #eee;flex-shrink:0}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-swatch{width:12px;height:8px;border-radius:2px}
.canvas{flex:1;overflow:hidden;cursor:grab;position:relative}
.canvas.grabbing{cursor:grabbing}
.pan-layer{transform-origin:top left;position:absolute;top:0;left:0}

/* Tree layout */
.tree{display:flex;flex-direction:column;align-items:center}
.vline{width:1px;height:20px;background:#c0bdb6;flex-shrink:0}
.hline-wrap{position:relative;display:flex;justify-content:center}
.children-row{display:flex;align-items:flex-start;position:relative}
.child-col{display:flex;flex-direction:column;align-items:center}

/* Uniform node */
.node{
  width:140px;
  min-height:52px;
  border-radius:6px;
  padding:6px 8px;
  text-align:center;
  cursor:pointer;
  position:relative;
  transition:box-shadow .15s,transform .15s;
  box-shadow:0 1px 2px rgba(0,0,0,.04);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  flex-shrink:0;
}
.node:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.1)}
.node .nm{font-size:10px;font-weight:700;line-height:1.3;word-break:break-word}
.node .ti{font-size:8px;opacity:.7;margin-top:1px;line-height:1.2;word-break:break-word}
.node .hc{font-size:7px;opacity:.5;margin-top:2px}
.node .desc{font-size:7px;opacity:.5;margin-top:1px;line-height:1.2}
.node .tog{position:absolute;top:1px;right:3px;font-size:8px;opacity:.35;cursor:pointer;line-height:1;z-index:2}
.node.tbh{border-style:dashed!important}
.node.highlight{box-shadow:0 0 0 2px rgba(83,74,183,.3)}

/* Dept node (wider) */
.node.dept{width:160px}
/* Top node */
.node.top{width:160px;min-height:56px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:#fff;border-radius:12px;padding:22px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:14px}
.modal label{display:block;font-size:10px;color:#666;margin:8px 0 2px}
.modal input,.modal select,.modal textarea{width:100%;padding:5px 8px;border:1px solid #ddd;border-radius:5px;font-size:12px;font-family:inherit;outline:none}
.modal input:focus,.modal textarea:focus{border-color:#2E5090}
.modal textarea{min-height:50px;resize:vertical}
.modal-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:16px}
.modal-actions button{padding:5px 12px;border:1px solid #ddd;background:#fff;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit}
.modal-actions .primary{background:#2E5090;color:#fff;border-color:#2E5090}
.modal-actions .danger{color:#A32D2D;border-color:#A32D2D}
</style>

let collapsed=new Set(),zoom=0.7,panX=60,panY=40,isPanning=false,sx=0,sy=0,ox=0,oy=0;
const cv=document.getElementById("canvas"),pl=document.getElementById("pan-layer");

function find(id,n=data){if(n.id===id)return n;if(n.children)for(let c of n.children){let f=find(id,c);if(f)return f;}return null;}
function findP(id,n=data,p=null){if(n.id===id)return p;if(n.children)for(let c of n.children){let f=findP(id,c,n);if(f)return f;}return null;}

function rn(node){
  const c=C[node.color]||C.gray;
  const tb=(node.name||"").includes("TBH");
  const hl=node.id==="edi";
  const hk=node.children&&node.children.length>0;
  const ic=collapsed.has(node.id);
  const isDept=node.nodeType==="dept";
  const isTop=node.nodeType==="top";
  const cls=["node"];
  if(tb)cls.push("tbh");
  if(hl)cls.push("highlight");
  if(isDept)cls.push("dept");
  if(isTop)cls.push("top");

  let h=`<div class="tree">`;
  h+=`<div class="${cls.join(" ")}" style="background:${c.bg};border:1.5px solid ${c.bd};color:${c.tx}" onclick="openEdit('${node.id}')">`;
  h+=`<div class="nm">${node.name||""}</div>`;
  if(node.title)h+=`<div class="ti">${node.title}</div>`;
  if(node.headcount)h+=`<div class="hc">${node.headcount}</div>`;
  if(node.desc)h+=`<div class="desc">${node.desc}</div>`;
  if(hk)h+=`<div class="tog" onclick="event.stopPropagation();tog('${node.id}')">${ic?"＋":"−"}</div>`;
  h+=`</div>`;

  if(hk&&!ic){
    h+=`<div class="vline"></div>`;
    // SVG connector lines drawn after render
    h+=`<div class="children-row" data-parent="${node.id}">`;
    node.children.forEach(ch=>{
      h+=`<div class="child-col" style="margin:0 3px"><div class="vline"></div>${rn(ch)}</div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  return h;
}

function render(){
  pl.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
  pl.innerHTML=`<div style="padding:20px">${rn(data)}</div>`;
  document.getElementById("zoom-label").textContent=Math.round(zoom*100)+"%";
  // Draw horizontal connector lines
  requestAnimationFrame(()=>{
    document.querySelectorAll(".children-row").forEach(row=>{
      const cols=row.querySelectorAll(":scope > .child-col");
      if(cols.length<2)return;
      const first=cols[0],last=cols[cols.length-1];
      const rr=row.getBoundingClientRect();
      const fl=first.getBoundingClientRect();
      const ll=last.getBoundingClientRect();
      const left=(fl.left+fl.width/2-rr.left)/zoom;
      const right=(ll.left+ll.width/2-rr.left)/zoom;
      const line=document.createElement("div");
      line.style.cssText=`position:absolute;top:0;height:1px;background:#c0bdb6;left:${left}px;width:${right-left}px;`;
      row.style.position="relative";
      row.prepend(line);
    });
  });
}

function tog(id){collapsed.has(id)?collapsed.delete(id):collapsed.add(id);render();}
function expandAll(){collapsed.clear();render();}
function collapseAll(){const w=n=>{if(n.children&&n.children.length){collapsed.add(n.id);n.children.forEach(w);}};data.children&&data.children.forEach(w);render();}
function resetView(){zoom=0.7;panX=60;panY=40;render();}

// Pan & Zoom
cv.addEventListener("mousedown",e=>{if(e.target.closest(".node"))return;isPanning=true;sx=e.clientX;sy=e.clientY;ox=panX;oy=panY;cv.classList.add("grabbing");});
cv.addEventListener("mousemove",e=>{if(!isPanning)return;panX=ox+(e.clientX-sx);panY=oy+(e.clientY-sy);pl.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;});
cv.addEventListener("mouseup",()=>{isPanning=false;cv.classList.remove("grabbing");});
cv.addEventListener("mouseleave",()=>{isPanning=false;cv.classList.remove("grabbing");});
cv.addEventListener("wheel",e=>{e.preventDefault();zoom=Math.min(Math.max(zoom+(e.deltaY>0?-0.05:0.05),0.15),1.8);render();},{passive:false});

// Edit
function openEdit(id){
  const node=find(id);if(!node)return;
  const opts=[["blue","藍"],["green","綠"],["teal","青"],["amber","橘"],["purple","紫"],["coral","橙紅"],["gray","灰"]];
  let sel=opts.map(([v,l])=>`<option value="${v}"${node.color===v?" selected":""}>${l}</option>`).join("");
  document.getElementById("modal-root").innerHTML=`
  <div class="modal-bg" onclick="if(event.target===this)closeEdit()">
    <div class="modal">
      <h3>編輯節點</h3>
      <label>名稱</label><input id="e-name" value="${(node.name||"").replace(/"/g,"&quot;")}">
      <label>職稱</label><input id="e-title" value="${(node.title||"").replace(/"/g,"&quot;")}">
      <label>人數</label><input id="e-hc" value="${(node.headcount||"").replace(/"/g,"&quot;")}">
      <label>說明</label><textarea id="e-desc">${node.desc||""}</textarea>
      <label>顏色</label><select id="e-color">${sel}</select>
      <div class="modal-actions">
        <button class="danger" onclick="delNode('${id}')">刪除</button>
        <button onclick="addChild('${id}')">新增下屬</button>
        <button onclick="closeEdit()">取消</button>
        <button class="primary" onclick="saveEdit('${id}')">儲存</button>
      </div>
    </div>
  </div>`;
}
function saveEdit(id){const n=find(id);if(!n)return;n.name=document.getElementById("e-name").value;n.title=document.getElementById("e-title").value;n.headcount=document.getElementById("e-hc").value;n.desc=document.getElementById("e-desc").value;n.color=document.getElementById("e-color").value;closeEdit();render();}
function delNode(id){if(id==="cto"){alert("無法刪除根節點");return;}if(!confirm("確定刪除？"))return;const p=findP(id);if(p&&p.children)p.children=p.children.filter(c=>c.id!==id);closeEdit();render();}
function addChild(pid){const p=find(pid);if(!p)return;if(!p.children)p.children=[];const nid="n"+Date.now();p.children.push({id:nid,name:"新節點",title:"",color:"amber"});closeEdit();render();setTimeout(()=>openEdit(nid),100);}
function closeEdit(){document.getElementById("modal-root").innerHTML="";}

render();
</script>
