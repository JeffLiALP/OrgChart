body{font-family:'Avenir Next','Noto Sans TC',system-ui,sans-serif;background:#fff;overflow:hidden;height:100vh;display:flex;flex-direction:column;color:#000}

.tabs{display:flex;gap:0;flex-shrink:0;background:#000;padding:0 24px}
.tab{padding:8px 20px;font-size:12px;font-weight:500;cursor:pointer;color:#999;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:#ccc}
.tab.active{color:#FAF054;border-bottom-color:#FAF054}
.toolbar{display:flex;gap:5px;align-items:center}
.toolbar button{padding:4px 10px;border:1px solid #555;background:transparent;border-radius:3px;font-size:10px;cursor:pointer;font-family:inherit;color:#ccc;transition:all .15s}
.toolbar button:hover{background:#333;color:#fff}
.toolbar .zoom-label{font-size:10px;color:#777;margin-left:4px;min-width:32px;text-align:right}
.legend-bar{display:flex;gap:14px;padding:8px 24px;font-size:10px;color:#666;flex-wrap:wrap;background:#f8f8f8;border-bottom:1px solid #eee;flex-shrink:0}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-swatch{width:14px;height:9px;border-radius:2px}
.canvas{flex:1;overflow:hidden;cursor:grab;position:relative;background:#fff}
.canvas.grabbing{cursor:grabbing}
.pan-layer{transform-origin:top left;position:absolute;top:0;left:0}
.page{display:none}
.page.active{display:block}

/* === ALP Brand Node Styles === */
.tree{display:flex;flex-direction:column;align-items:center}
.vline{width:1px;height:18px;background:#D5D5D5;flex-shrink:0}
.children-row{display:flex;align-items:flex-start;position:relative}
.child-col{display:flex;flex-direction:column;align-items:center}

.node{width:140px;min-height:50px;border-radius:4px;padding:6px 8px;text-align:center;cursor:pointer;position:relative;transition:transform .15s;display:flex;flex-direction:column;justify-content:center;align-items:center;flex-shrink:0}
.node:hover{transform:translateY(-1px)}
.node .nm{font-size:10px;font-weight:600;line-height:1.3;word-break:break-word}
.node .ti{font-size:8px;margin-top:1px;line-height:1.2;word-break:break-word}
.node .hc{font-size:7px;margin-top:2px}
.node .desc{font-size:7px;margin-top:1px;line-height:1.2}
.node .tog{position:absolute;top:1px;right:3px;font-size:8px;cursor:pointer;line-height:1;z-index:2}
.node.tbh{border-style:dashed!important}
.node.highlight{box-shadow:0 0 0 2px #FAF054}
.node.dept{width:155px}
.node.top{width:170px;min-height:56px}

/* Brand colors mapped */
.node.c-black{background:#000;color:#fff;border:1px solid #000}
.node.c-black .ti,.node.c-black .hc,.node.c-black .desc,.node.c-black .tog{color:#D5D5D5}
.node.c-gray{background:#f5f5f5;color:#000;border:1px solid #D5D5D5}
.node.c-gray .ti,.node.c-gray .hc,.node.c-gray .desc{color:#666}
.node.c-gray .tog{color:#999}
.node.c-darkgray{background:#D5D5D5;color:#000;border:1px solid #bbb}
.node.c-darkgray .ti,.node.c-darkgray .hc,.node.c-darkgray .desc,.node.c-darkgray .tog{color:#444}
.node.c-tbh{background:#fff;color:#999;border:1.5px dashed #D5D5D5}
.node.c-tbh .nm{color:#999}
.node.c-tbh .ti,.node.c-tbh .hc{color:#bbb}
.node.c-dispatch{background:#f8f8f8;color:#000;border:1.5px dotted #999}
.node.c-dispatch .ti,.node.c-dispatch .desc{color:#666}
.node.c-new{background:#000;color:#FAF054;border:1.5px solid #FAF054}
.node.c-new .ti,.node.c-new .hc,.node.c-new .desc,.node.c-new .tog{color:#ccc}
.node.c-new .nm{color:#FAF054}
/* Company page specific */
.node.c-chairman{background:#000;color:#fff;border:none;min-width:180px}
.node.c-chairman .ti{color:#D5D5D5}
.node.c-dept{background:#000;color:#fff;border:none;min-width:110px}
.node.c-dept .ti,.node.c-dept .person{color:#D5D5D5}
.node.c-dept-new{background:#000;color:#fff;border:1.5px solid #FAF054;min-width:110px;position:relative}
.node.c-dept-new .ti,.node.c-dept-new .person{color:#D5D5D5}
.new-tag{position:absolute;top:-8px;right:-6px;background:#FAF054;color:#000;font-size:7px;font-weight:700;padding:1px 5px;border-radius:2px;letter-spacing:.5px}
.node.c-cfo{background:#fff;color:#000;border:1.5px solid #000;min-width:150px}
.node.c-cfo .ti,.node.c-cfo .person{color:#555}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999}
.modal{background:#fff;border-radius:4px;padding:24px;width:360px;border:1px solid #ddd}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px}
.modal label{display:block;font-size:10px;color:#666;margin:10px 0 3px}
.modal input,.modal select,.modal textarea{width:100%;padding:6px 10px;border:1px solid #ddd;border-radius:3px;font-size:12px;font-family:inherit;outline:none}
.modal input:focus,.modal textarea:focus{border-color:#000}
.modal textarea{min-height:50px;resize:vertical}
.modal-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:18px}
.modal-actions button{padding:6px 14px;border:1px solid #ddd;background:#fff;border-radius:3px;font-size:11px;cursor:pointer;font-family:inherit}
.modal-actions .primary{background:#000;color:#fff;border-color:#000}
.modal-actions .danger{color:#c00;border-color:#c00}

function getData(){return currentPage==='company'?companyData:itData;}
function find(id,n){n=n||getData();if(n.id===id)return n;if(n.children)for(let c of n.children){let f=find(id,c);if(f)return f;}return null;}
function findP(id,n,p){n=n||getData();p=p||null;if(n.id===id)return p;if(n.children)for(let c of n.children){let f=findP(id,c,n);if(f)return f;}return null;}

function rn(node){

  const hk=node.children&&node.children.length>0;
  const ic=collapsed.has(node.id);
  const cls=["node"];
  if(node.cls)cls.push(node.cls);
  if(isTBH&&!node.cls?.includes("c-tbh"))cls.push("tbh");

  let h='<div class="tree">';
  h+='<div class="'+cls.join(" ")+'" onclick="openEdit(\''+node.id+'\')">';

  if(node.tag)h+='<span class="new-tag">'+node.tag+'</span>';
  if(hk)h+='<div class="tog" onclick="event.stopPropagation();tog(\''+node.id+'\')">'+(ic?"+":"-")+'</div>';
  h+='</div>';

  if(hk&&!ic){
    h+='<div class="vline"></div>';
    h+='<div class="children-row" data-parent="'+node.id+'">';
    node.children.forEach(ch=>{
      h+='<div class="child-col" style="margin:0 3px"><div class="vline"></div>'+rn(ch)+'</div>';
    });
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function render(){
  pl.style.transform='translate('+panX+'px,'+panY+'px) scale('+zoom+')';
  const d=getData();
  let extra='';
  pl.innerHTML='<div style="padding:24px" id="content-wrap">'+rn(d)+extra+'</div>';
  document.getElementById("zoom-label").textContent=Math.round(zoom*100)+"%";
  requestAnimationFrame(()=>{
    document.querySelectorAll(".children-row").forEach(row=>{
      const cols=row.querySelectorAll(":scope > .child-col");
      if(cols.length<2)return;
      const first=cols[0],last=cols[cols.length-1];
      const rr=row.getBoundingClientRect();
      const fl=first.getBoundingClientRect();
      const ll=last.getBoundingClientRect();
      const left=(fl.left+fl.width/2-rr.left)/zoom;
      const right=(ll.left+ll.width/2-rr.left)/zoom;
      const line=document.createElement("div");
      line.style.cssText='position:absolute;top:0;height:1px;background:#D5D5D5;left:'+left+'px;width:'+(right-left)+'px;';
      row.style.position="relative";
      row.prepend(line);
    });
  });
}

function switchPage(page){
  currentPage=page;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelector('.tab:nth-child('+(page==='company'?'1':'2')+')').classList.add('active');
  document.getElementById('legend-company').style.display=page==='company'?'flex':'none';
  document.getElementById('legend-it').style.display=page==='it'?'flex':'none';
  collapsed.clear();
  zoom=1;panX=0;panY=0;
  render();
  setTimeout(autoFit,50);
}

function tog(id){collapsed.has(id)?collapsed.delete(id):collapsed.add(id);render();setTimeout(autoFit,50);}
function expandAll(){collapsed.clear();render();setTimeout(autoFit,50);}
function collapseAll(){const w=n=>{if(n.children&&n.children.length){collapsed.add(n.id);n.children.forEach(w);}};const d=getData();d.children&&d.children.forEach(w);render();setTimeout(autoFit,50);}
function resetView(){zoom=1;panX=0;panY=0;render();setTimeout(autoFit,50);}

function autoFit(){
  const wrap=document.getElementById('content-wrap');
  if(!wrap)return;
  const cw=wrap.scrollWidth;
  const ch=wrap.scrollHeight;
  const vw=cv.clientWidth;
  const vh=cv.clientHeight;
  if(cw===0||ch===0)return;
  const zx=vw/cw;
  const zy=vh/ch;
  zoom=Math.min(zx,zy,1.2)*0.92;
  panX=Math.max((vw-cw*zoom)/2,10);
  panY=Math.max((vh-ch*zoom)/2,10);
  pl.style.transform='translate('+panX+'px,'+panY+'px) scale('+zoom+')';
  document.getElementById("zoom-label").textContent=Math.round(zoom*100)+"%";
}

// Pan & Zoom
cv.addEventListener("mousedown",e=>{if(e.target.closest(".node"))return;isPanning=true;sx=e.clientX;sy=e.clientY;ox=panX;oy=panY;cv.classList.add("grabbing");});
cv.addEventListener("mousemove",e=>{if(!isPanning)return;panX=ox+(e.clientX-sx);panY=oy+(e.clientY-sy);pl.style.transform='translate('+panX+'px,'+panY+'px) scale('+zoom+')';});
cv.addEventListener("mouseup",()=>{isPanning=false;cv.classList.remove("grabbing");});
cv.addEventListener("mouseleave",()=>{isPanning=false;cv.classList.remove("grabbing");});
cv.addEventListener("wheel",e=>{e.preventDefault();zoom=Math.min(Math.max(zoom+(e.deltaY>0?-0.05:0.05),0.15),2);render();},{passive:false});

// Edit (IT page only)
function openEdit(id){
  if(currentPage==='company')return;
  const node=find(id);if(!node)return;
  const opts=[["c-black","黑（管理層）"],["c-darkgray","深灰（主管）"],["c-gray","淺灰（成員）"],["c-tbh","虛線（TBH）"],["c-dispatch","點線（派遣）"],["c-new","螢光黃（新組別）"]];
  let sel=opts.map(([v,l])=>'<option value="'+v+'"'+(node.cls?.includes(v)?' selected':'')+'>'+l+'</option>').join("");
  document.getElementById("modal-root").innerHTML=
  '<div class="modal-bg" onclick="if(event.target===this)closeEdit()"><div class="modal"><h3>編輯節點</h3>'+
  '<label>名稱</label><input id="e-name" value="'+(node.name||"").replace(/"/g,"&quot;")+'">'+
  '<label>職稱</label><input id="e-title" value="'+(node.title||"").replace(/"/g,"&quot;")+'">'+
  '<label>人數</label><input id="e-hc" value="'+(node.headcount||"").replace(/"/g,"&quot;")+'">'+
  '<label>說明</label><textarea id="e-desc">'+(node.desc||"")+'</textarea>'+
  '<label>樣式</label><select id="e-cls">'+sel+'</select>'+
  '<div class="modal-actions">'+
  '<button class="danger" onclick="delNode(\''+id+'\')">刪除</button>'+
  '<button onclick="addChild(\''+id+'\')">新增下屬</button>'+
  '<button onclick="closeEdit()">取消</button>'+
  '<button class="primary" onclick="saveEdit(\''+id+'\')">儲存</button></div></div></div>';
}
function saveEdit(id){const n=find(id);if(!n)return;n.name=document.getElementById("e-name").value;n.title=document.getElementById("e-title").value;n.headcount=document.getElementById("e-hc").value;n.desc=document.getElementById("e-desc").value;n.cls=document.getElementById("e-cls").value;closeEdit();render();}
function delNode(id){if(id==="cto"){alert("無法刪除根節點");return;}if(!confirm("確定刪除？"))return;const p=findP(id);if(p&&p.children)p.children=p.children.filter(c=>c.id!==id);closeEdit();render();}
function addChild(pid){const p=find(pid);if(!p)return;if(!p.children)p.children=[];const nid="n"+Date.now();p.children.push({id:nid,name:"新節點",title:"",cls:"c-gray"});closeEdit();render();setTimeout(()=>openEdit(nid),100);}
function closeEdit(){document.getElementById("modal-root").innerHTML="";}

// Init
render();
setTimeout(autoFit,100);
window.addEventListener('resize',()=>{clearTimeout(window._rzt);window._rzt=setTimeout(autoFit,150);});
</script>
</body>
</html>
